<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Box Model in CSS</title>
    <style>
        body{
            background-color: #212121;
        }
        .container{
            margin: 200px 500px 0px;
        }
        #btn{
            padding: 50px 100px;
            border: none;
            font-size: large;
            font-style: bold;
            color: #212121;
            background-color: green;
            
            border: rgb(255, 255, 0) solid;
            outline: white dotted;
            outline-offset: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <button id="btn">Click Me</button>
    </div>
</body>
</html>
