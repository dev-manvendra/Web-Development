<!DOCTYPE html>
<html lang="en">
<head>
    <title>Manipulating background in CSS</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            
        }
        .container{
            height: 100vh;
            width: 100%;
        }
        div{
            background-image: url(../images/shoe.avif);
            background-size: 410px;
            background-repeat: no-repeat;
            background-position:center;
        }
    </style>
</head>
<body>
    <div class="images container">
    </div>
    
</body>
</html>
