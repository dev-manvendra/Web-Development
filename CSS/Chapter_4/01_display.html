<!-- This tutorial is to learn how to use display property of CSS and different way to display elements-->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <title>Display in CSS</title>
    <style>
        body{
            background-color: #212121;
        }
        .box{
            display: inline-block;
            background-color: yellowgreen;
            padding: 3px 3px;
            
        }
        .btn{
            background-color: green;
            border: none;
            color: #212121;
        }
    </style>
 </head>
 <body>
    <div class="box">
        <button class="btn">BTN 1</button>
        <button class="btn">BTN 2</button>
        <button class="btn">BTN 3</button>
        <button class="btn">BTN 4</button>
    </div>
     <div class="box">
        <button class="btn">BTN 1</button>
        <button class="btn">BTN 2</button>
        <button class="btn">BTN 3</button>
        <button class="btn">BTN 4</button>
    </div>
    
 </body>
 </html>
